{% extends "accounts/base.html" %}
{% block title %}Reset password — spurlos{% endblock %}
{% block content %}
<h1>Reset password</h1>
<p>Enter your email address and we'll send you a reset link.</p>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Send reset link</button>
</form>
<div class="links"><a href="{% url 'login' %}">Back to sign in</a></div>
{% endblock %}
