<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}spurlos{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 2rem; width: 100%; max-width: 400px; }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; }
    label { display: block; font-size: .875rem; margin-bottom: .25rem; font-weight: 500; }
    input { width: 100%; padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
    button, .btn { display: inline-block; width: 100%; padding: .6rem; background: #111; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; }
    button:hover, .btn:hover { background: #333; }
    .links { margin-top: 1rem; font-size: .875rem; text-align: center; }
    .links a { color: #111; }
    .errorlist { color: #dc2626; font-size: .85rem; list-style: none; padding: 0; margin: -.5rem 0 .75rem; }
    .helptext { font-size: .8rem; color: #6b7280; margin: -.75rem 0 .75rem; }
  </style>
</head>
<body>
<div class="card">
  {% block content %}{% endblock %}
</div>
</body>
</html>
