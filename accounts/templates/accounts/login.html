{% extends "accounts/base.html" %}
{% block title %}Sign in — spurlos{% endblock %}
{% block content %}
<h1>Sign in</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Sign in</button>
</form>
<div class="links">
  <a href="{% url 'password_reset' %}">Forgot password?</a>
</div>
{% endblock %}
