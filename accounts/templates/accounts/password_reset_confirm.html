{% extends "accounts/base.html" %}
{% block title %}Set new password — spurlos{% endblock %}
{% block content %}
<h1>Set new password</h1>
{% if validlink %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Set password</button>
</form>
{% else %}
<p>This reset link is invalid or has expired. <a href="{% url 'password_reset' %}">Request a new one.</a></p>
{% endif %}
{% endblock %}
