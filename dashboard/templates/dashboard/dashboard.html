{% extends "dashboard/base_app.html" %}

{% block title %}Dashboard — spurlos{% endblock %}

{% block content %}
<h1 style="margin: 0 0 4px; font-size: 1.5rem; color: #0f172a;">Welcome back, {{ request.user.first_name }}.</h1>
<p style="margin: 0 0 32px; color: #64748b; font-size: .9375rem;">Here's what's happening in your workspace.</p>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;">
  {% for card in stat_cards %}
  <div style="background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px 24px;">
    <p style="margin: 0 0 4px; font-size: .8125rem; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: .05em;">{{ card.label }}</p>
    <p style="margin: 0; font-size: 1.75rem; font-weight: 700; color: #0f172a;">{{ card.value }}</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
